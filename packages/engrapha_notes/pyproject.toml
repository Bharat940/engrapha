[build-system]
requires = ["setuptools>=75.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "engrapha-notes"
version = "0.1.0"
description = "Themed ReportLab notes toolkit with markdown, HTML, PPTX, and flashcard exports"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    {name = "Bharat Dangi"}
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = [
    "reportlab>=4.5.1",
    "pygments>=2.20.0",
    "matplotlib>=3.10",
    "engrapha-diagrams>=0.1.0",
]

[project.optional-dependencies]

flashcards = [
    "genanki>=0.13.1",
]

split = [
    "pymupdf>=1.25.0",
]

pptx = [
    "python-pptx>=1.0.2",
]

svg = [
    "svglib>=1.5.1",
]

all = [
    "genanki>=0.13.1",
    "pymupdf>=1.25.0",
    "python-pptx>=1.0.2",
    "svglib>=1.5.1",
]

dev = [
    "pytest>=9.0.3",
    "pytest-cov>=6.0",
    "ruff>=0.9.0",
    "mypy>=1.11.0",
]

[project.scripts]
engrapha = "engrapha_notes.cli:main"
pdfnotes = "engrapha_notes.cli:main"

[tool.setuptools]

[tool.setuptools.packages.find]
where = ["src"]
include = ["engrapha_notes*"]
exclude = ["engrapha_notes.tests*"]
