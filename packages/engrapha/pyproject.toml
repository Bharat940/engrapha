[build-system]
requires = ["setuptools>=75.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "engrapha"
version = "0.1.0"
description = "Meta-package that installs Engrapha Notes and Engrapha Diagrams."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]

authors = [
    { name = "Bharat Dangi" }
]

classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Operating System :: OS Independent",
]

dependencies = [
    "engrapha-notes[all]>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/Bharat940/engrapha"
Documentation = "https://bharat940.github.io/engrapha"
Repository = "https://github.com/Bharat940/engrapha"
Issues = "https://github.com/Bharat940/engrapha/issues"

[tool.setuptools]

[tool.setuptools.packages.find]
where = ["."]
include = ["engrapha*"]
