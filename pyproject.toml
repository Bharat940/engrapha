[tool.pytest.ini_options]
testpaths = [
    "packages/engrapha_diagrams/tests",
    "packages/engrapha_notes/tests",
]
python_files = ["test_*.py"]

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    "study_notes",
    ".venv",
    "build",
    "dist",
]

[tool.mypy]
python_version = "3.12"
warn_unused_configs = true
ignore_missing_imports = true
exclude = [
    "packages/*/tests",
]
files = [
    "packages/engrapha_notes",
    "packages/engrapha_diagrams",
]

[[tool.mypy.overrides]]
module = "numpy.*"
ignore_errors = true
