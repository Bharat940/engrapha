name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ./packages/engrapha_diagrams[dev]
        pip install -e ./packages/engrapha_notes[dev,all]

    - name: Run Ruff Check
      run: ruff check .

    - name: Run Mypy
      run: mypy .

    - name: Run Tests
      run: pytest
